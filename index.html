<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home decorand fashion Promotions</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f5f5f5;
            --accent-color: #c0a062;
            --neon-red: #ff3333;
            --neon-blue: #33ccff;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }
        header {
            padding: 100px 0 50px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #fff;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 10px;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 40px;
        }
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 40px 0;
        }
        .link-btn {
            display: block;
            padding: 18px 25px;
            background-color: #1a1a1a;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(192, 160, 98, 0.1);
        }
        .link-btn:hover {
            background-color: #2a2a2a;
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--accent-color);
        }
        .link-btn.neon-red:hover {
            box-shadow: 0 0 15px var(--neon-red);
        }
        .link-btn.neon-blue:hover {
            box-shadow: 0 0 15px var(--neon-blue);
        }
        footer {
            margin-top: auto;
            padding: 30px 0;
            font-size: 0.9rem;
            color: #555;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Home decorand fashion Collabs</h1>
            <p class="subtitle">Connecting Premium Brands with Quality Living</p>
        </header>

        <main>
            <div class="links-grid">
                <a href="#" class="link-btn">Explore Our Catalog</a>
                <a href="#" class="link-btn neon-red">Brand Partnership Inquiries</a>
                <a href="#" class="link-btn neon-blue">View Featured Kitchen Utensils</a>
              <a href="mailto:generationalhelperz@gmail.com" class="link-btn">Contact Us</a>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Home & Kitchen Promotions. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
